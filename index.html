<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
    </head>
    <body>
        <header>
            <h1>Calculator</h1>
        </header>
        <div class="calc-layout">
            <table>
                <tr id="row-1">
                    <td id="screen" colspan="4"><div id="display"><p>This is just a Layout of Simple Caclulator. JavaScript will be programmed soon.</p></div></td>
                </tr>
                <tr id="row-2">
                    <td colspan="2"><button>AC</button></td>
                    <td><button>&percnt;</button></td>
                    <td><button>&divide;</button></td>
                </tr>
                <tr id="row-3">
                    <td><button>7</button></td>
                    <td><button>8</button></td>
                    <td><button>9</button></td>
                    <td><button>&times;</button></td>
                </tr>
                <tr id="row-4">
                    <td><button>4</button></td>
                    <td><button>5</button></td>
                    <td><button>6</button></td>
                    <td><button>&minus;</button></td>
                </tr>
                <tr id="row-5">
                    <td><button>1</button></td>
                    <td><button>2</button></td>
                    <td><button>3</button></td>
                    <td><button>&plus;</button></td>
                </tr>
                <tr id="row-6">
                    <td colspan="2"><button>0</button></td>
                    <td><button>&period;</button></td>
                    <td><button>&equals;</button></td>
                </tr>
            </table>
        </div>
    </body>
</html>
